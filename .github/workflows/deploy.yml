name: Deploy to BIGVPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          PROJECT_NAME="ted-presentation"
          echo "Deploying ${PROJECT_NAME}..."

          tar czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='AGENTS.md' \
            --exclude='DEPLOY.md' \
            --exclude='deploy-key' \
            .

          cat /tmp/deploy.tar.gz | ssh -i ~/.ssh/deploy_key \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "PROJECT_DIR=/opt/bigvps/projects/${PROJECT_NAME}
             mkdir -p \$PROJECT_DIR
             cd \$PROJECT_DIR
             rm -rf *
             tar xzf -
             docker compose down 2>/dev/null || true
             docker compose up -d --build --remove-orphans
             echo 'Deploy complete: ${PROJECT_NAME}'"
