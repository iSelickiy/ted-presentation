events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  charset utf-8;
  server_tokens off;
  sendfile on;

  gzip on;
  gzip_types text/plain text/css text/markdown application/javascript image/svg+xml;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ =404;
    }

    location /downloads/ {
      add_header Content-Disposition "attachment";
      try_files $uri =404;
    }

    location ~* \.(md|markdown)$ {
      types {
        text/markdown md markdown;
      }
      default_type text/markdown;
      add_header Content-Disposition "attachment";
      charset utf-8;
      try_files $uri =404;
    }
  }
}
